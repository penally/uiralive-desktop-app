# Builds the Uira Live desktop app and publishes releases.
# Runs from: penally/uiralive (this repo)
# Publishes to: penally/uiralive-desktop-app (releases only - NOT penally/uiralive)
# Trigger: push a tag like v1.0.5 or app-v1.0.5
name: Release Desktop App

on:
  push:
    tags:
      - "v*"
      - "app-v*"
      - "release/*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: "-wl"
          - os: macos-latest
            platform: "-m"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Extract version from tag
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: node app/scripts/extract-version.js

      - name: Install app dependencies
        run: npm ci --prefix app --no-workspaces

      - name: Set app version from tag
        working-directory: app
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          echo "APP_VERSION=$APP_VERSION"
          npm version "$APP_VERSION" --no-git-tag-version --allow-same-version
          node -e "console.log('package.json version:', require('./package.json').version)"

      - name: Verify release target (penally/uiralive-desktop-app)
        working-directory: app
        run: |
          node -e "
            process.env.PUBLISH_GITHUB = 'true';
            const config = require('./electron-builder.config.js');
            const pub = config.publish;
            const target = pub.owner + '/' + pub.repo;
            const expected = 'penally/uiralive-desktop-app';
            if (target !== expected) {
              console.error('ERROR: Release target is', target, '- expected', expected);
              process.exit(1);
            }
            console.log('Release target verified:', target);
          "

      - name: Build and publish to uiralive-desktop-app
        run: node scripts/clean-out.js && node scripts/png-to-ico.js && electron-builder ${{ matrix.platform }} --config electron-builder.config.js --publish always
        working-directory: app
        env:
          PUBLISH_GITHUB: "true"
          GH_TOKEN: ${{ secrets.DESKTOP_APP_TOKEN }}
