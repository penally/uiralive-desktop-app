# Builds the Uira Live desktop app and publishes releases.
# Runs from: penally/uiralive-desktop-app (this repo)
# Trigger: push a tag like v1.0.5
name: Release Desktop App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: "-wl"
            config: "electron-builder.ci.js"
          - os: macos-latest
            platform: "-m"
            config: "electron-builder.config.js"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Extract version from tag
        id: version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: node scripts/extract-version.js

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Verify electron-builder
        run: |
          npm ls electron-builder
          npx --no-install electron-builder --version

      - name: Set app version from tag
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm version "$APP_VERSION" --no-git-tag-version --allow-same-version
          node -e "console.log('package.json version:', require('./package.json').version)"

      - name: Install Wine (for Windows build on Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Build and publish
        run: |
          node scripts/clean-out.js
          node scripts/png-to-ico.js
          ./node_modules/.bin/electron-builder ${{ matrix.platform }} --config ${{ matrix.config }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
